server {
    server_name test_server;
    host 127.0.0.1;
    listen 8081;
    root ./site/;

    # Default root directory
    index index.html;

    # Default error page
    error_page 404 404.html;

    # Root location
    location / {
        #root upload;
    }
    # Upload location
    location /upload {
        upload ./;
	autoindex on;
	root ./site/resources/upload;
    }
    # autoindex
    location /files {
        methods GET DELETE;
        autoindex on;
        root ./site/;
    }
    # CGI location
    location /cgi {
        methods GET POST;

        # python
        cgi .py /usr/bin/python3;
        # Perl CGI
        cgi .pl /usr/bin/perl;
    }
    location /redirect {
        return 301 /upload;
    }
    
}
